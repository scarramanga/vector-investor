apiVersion: batch/v1
kind: CronJob
metadata:
  name: vector-followup-job
  namespace: vector-prod
  labels:
    app: vector-followup-job
spec:
  schedule: "0 9 * * *"
  timeZone: "Pacific/Auckland"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: vector-followup-job
        spec:
          restartPolicy: Never
          containers:
            - name: vector-followup-job
              image: registry.digitalocean.com/docr-prod/vector-frontend:efb2e52
              command: ["node", "dist-server/followupJob.js"]
              envFrom:
                - secretRef:
                    name: vector-secrets
              env:
                - name: NODE_ENV
                  value: production
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
