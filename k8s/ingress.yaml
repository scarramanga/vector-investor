apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vector-frontend
  namespace: vector-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - vectorinvestor.app
      secretName: vector-frontend-tls
  rules:
    - host: vectorinvestor.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vector-frontend
                port:
                  number: 80
